<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabula Peutingeriana Viewer</title>
  <link rel="stylesheet" href="styles.css?v=9">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
</head>
<body>
  <h1 class="viewer-title">Tabula Peutingeriana Viewer</h1>
  <p id="status" class="status" aria-live="polite"></p>
  <div class="viewer-shell">
    <div id="openseadragon1"></div>
    <div class="viewer-controls" role="toolbar" aria-label="Viewer controls">
      <button id="control-zoom-in" class="viewer-btn" type="button" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="10" cy="10" r="5.5"></circle>
          <path d="M14.7 14.7l4.1 4.1"></path>
          <path d="M10 7.5v5"></path>
          <path d="M7.5 10h5"></path>
        </svg>
      </button>
      <button id="control-zoom-out" class="viewer-btn" type="button" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="10" cy="10" r="5.5"></circle>
          <path d="M14.7 14.7l4.1 4.1"></path>
          <path d="M7.5 10h5"></path>
        </svg>
      </button>
      <button id="control-home" class="viewer-btn" type="button" aria-label="Go home">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 4.5l7.4 6.1c.5.4.2 1.2-.4 1.2h-1.3V19c0 .6-.4 1-1 1H7.3c-.6 0-1-.4-1-1v-7.2H5c-.6 0-.9-.8-.4-1.2L12 4.5z"></path>
          <rect x="10" y="14" width="4" height="6" rx="0.8"></rect>
        </svg>
      </button>
      <button id="control-fullpage" class="viewer-btn" type="button" aria-label="Toggle full page" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9 4H4v5M15 4h5v5M4 15v5h5M20 15v5h-5"></path>
        </svg>
      </button>
    </div>
  </div>
  <script src="main.js?v=9"></script>
</body>
</html>
